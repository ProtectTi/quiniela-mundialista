<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña — Quiniela Mundialista 2026</title>
  <meta name="theme-color" content="#1a1a2e" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Estilos propios (mismos que jugador) -->
  <link rel="stylesheet" href="css/jugador.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/logo.png" />
</head>
<body>

  <div class="wrapper">
    <div class="auth-card">

      <!-- Título -->
      <h1 class="brand-title">
        <span class="gold">Quiniela</span><span class="mexico">Mundialista</span>
      </h1>
      <p class="brand-sub">Copa Mundial de la FIFA 2026</p>

      <!-- Cabecera -->
      <div class="reset-page-header">
        <span class="reset-page-icon">🔑</span>
        <div>
          <div class="reset-page-titulo">Restablecer contraseña</div>
          <div class="reset-page-sub">Ingresa tu usuario y tu nueva contraseña</div>
        </div>
      </div>

      <!-- Alerta -->
      <div class="alert-custom" id="alertMsg"></div>

      <!-- Formulario -->
      <div id="form-reset">
        <div class="mb-field">
          <label class="form-label-custom">Usuario</label>
          <input type="text" class="input-custom" id="reset-usuario" placeholder="Tu usuario" maxlength="30" autocomplete="off" />
        </div>
        <div class="mb-field">
          <label class="form-label-custom">Nueva contraseña</label>
          <input type="password" class="input-custom" id="reset-pass1" placeholder="Mínimo 4 caracteres" maxlength="30" />
        </div>
        <div class="mb-field">
          <label class="form-label-custom">Confirmar nueva contraseña</label>
          <input type="password" class="input-custom" id="reset-pass2" placeholder="Repite la contraseña" maxlength="30" />
        </div>
        <button class="btn-gold" id="btn-reset" onclick="solicitarReset()">Cambiar contraseña</button>
        <div class="text-center mt-3">
          <a href="jugador.html" class="btn-reset-link">← Volver al inicio de sesión</a>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/reset.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
