<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Quiniela Mundialista 2026</title>
  <meta name="description" content="Panel de administración de la Quiniela Mundialista 2026." />
  <meta property="og:title" content="Admin — Quiniela Mundialista 2026" />
  <meta property="og:description" content="Panel de administración de la Quiniela Mundialista 2026." />
  <meta property="og:image" content="img/logo.png" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#1a1a2e" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/logo.png" />
</head>
<body>

  <div class="wrapper">
    <div class="auth-card">

      <!-- Título -->
      <div class="brand-header">
        <h1 class="brand-title">
          <span class="gold">Quiniela</span><span class="mexico">Mundialista</span>
        </h1>
        <span class="badge-admin">Admin</span>
      </div>
      <p class="brand-sub">Panel de administración</p>

      <!-- Alerta -->
      <div class="alert-custom" id="alertMsg"></div>

      <!-- Formulario -->
      <div class="mb-field">
        <label class="form-label-custom">Contraseña de admin</label>
        <input type="password" class="input-custom" id="admin-pass" placeholder="Ingresa la contraseña" maxlength="30" />
      </div>
      <button class="btn-gold" id="btn-entrar" onclick="entrarPanel()">Entrar al panel</button>

    </div>
  </div>

    <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lógica Admin -->
  <script type="module" src="js/admin.js"></script>


  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
