<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — Quiniela Mundialista 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:    #f5c518;
      --mexico:  #00b140;
      --bg:      #0d0d1a;
      --card:    #1a1a2e;
      --text:    #f0f0f0;
      --muted:   #8888aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 480px;
    }

    .number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 20vw, 10rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--mexico));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .emoji {
      font-size: 3rem;
      margin: 0.5rem 0;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background: var(--gold);
      color: #0d0d1a;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }
  </style>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="img/logo.png" />
</head>
<body>
  <div class="container">
    <div class="number">404</div>
    <div class="emoji">⚽</div>
    <h1>Página no encontrada</h1>
    <p>Esta jugada no existe en el reglamento.<br>Vuelve al inicio y sigue con tu quiniela.</p>
    <a href="jugador.html" class="btn">🏠 Volver al inicio</a>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
