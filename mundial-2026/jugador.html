<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiniela Mundialista 2026</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/jugador.css" />
</head>
<body>

  <div class="wrapper">
    <div class="auth-card">

      <!-- Título -->
      <h1 class="brand-title">
        <span class="gold">Quiniela</span><span class="mexico">Mundialista</span>
      </h1>
      <p class="brand-sub">Copa Mundial de la FIFA 2026</p>

      <!-- Tabs -->
      <div class="nav-tabs-custom" role="tablist">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- Alerta -->
      <div class="alert-custom" id="alertMsg"></div>

      <!-- ── FORMULARIO REGISTRO ── -->
      <div id="form-register" style="display:none;">
        <div class="mb-field">
          <label class="form-label-custom">Nombre completo</label>
          <input type="text" class="input-custom" id="reg-nombre" placeholder="Ej: Juan Pérez" maxlength="50" autocomplete="off" />
        </div>
        <div class="mb-field">
          <label class="form-label-custom">Contraseña</label>
          <input type="password" class="input-custom" id="reg-pass" placeholder="Mínimo 4 caracteres" maxlength="30" />
        </div>
        <div class="mb-field">
          <label class="form-label-custom">Confirmar contraseña</label>
          <input type="password" class="input-custom" id="reg-pass2" placeholder="Repite tu contraseña" maxlength="30" />
        </div>
        <button class="btn-gold" id="btn-register" onclick="registrar()">Crear cuenta</button>
      </div>

      <!-- ── FORMULARIO LOGIN ── -->
      <div id="form-login">
        <div class="mb-field">
          <label class="form-label-custom">Nombre completo</label>
          <input type="text" class="input-custom" id="login-nombre" placeholder="Ej: Juan Pérez" maxlength="50" autocomplete="off" />
        </div>
        <div class="mb-field">
          <label class="form-label-custom">Contraseña</label>
          <input type="password" class="input-custom" id="login-pass" placeholder="Tu contraseña" maxlength="30" />
        </div>
        <button class="btn-gold" id="btn-login" onclick="iniciarSesion()">Entrar</button>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Lógica Firebase -->
  <script type="module" src="js/jugador.js"></script>

</body>
</html>
