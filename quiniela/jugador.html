<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela Mundialista</title>
  <link rel="stylesheet" href="css/jugador.css">
  <style>
    #loader{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
    .spinner{width:40px;height:40px;border:3px solid rgba(245,200,66,0.2);border-top-color:#f5c842;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loader-txt{color:#f5c842;font-family:'DM Sans',sans-serif;font-size:13px;}
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-txt">Conectando...</div>
</div>

<!-- AUTH -->
<div id="auth-wrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">QUINIELA<span class="mundo">MUNDIALISTA</span></div>
    <div class="auth-sub">Copa Mundial De La FIFA 2026</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="setTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="setTab('registro')">Registrarse</button>
    </div>
    <div id="tab-login">
      <div class="campo"><label>Nombre de usuario</label><input type="text" id="l-nombre" placeholder="Tu nombre" onkeydown="if(event.key==='Enter')window.login()"></div>
      <div class="campo"><label>Contraseña</label><input type="password" id="l-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')window.login()"></div>
      <button class="btn-auth" onclick="window.login()">Entrar</button>
      <div class="err-auth" id="err-login"></div>
    </div>
    <div id="tab-registro" style="display:none;">
      <div class="campo"><label>Nombre completo</label><input type="text" id="r-nombre" placeholder="Ej: Juan Pérez" maxlength="40"></div>
      <div class="campo"><label>Contraseña</label><input type="password" id="r-pwd" placeholder="Mínimo 4 caracteres"></div>
      <div class="campo"><label>Confirmar contraseña</label><input type="password" id="r-pwd2" placeholder="Repite tu contraseña" onkeydown="if(event.key==='Enter')window.registrar()"></div>
      <button class="btn-auth" onclick="window.registrar()">Crear cuenta</button>
      <div class="err-auth" id="err-reg"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="logo">QUINIELA<span>MUNDIALISTA</span></div>
    <nav class="nav">
      <button class="nav-btn active" onclick="window.irA('inicio')">Inicio</button>
      <button class="nav-btn" onclick="window.irA('miquiniela')">Mi quiniela</button>
      <button class="nav-btn" onclick="window.irA('quinielas')">Quinielas</button>
      <button class="nav-btn" onclick="window.irA('posiciones')">Posiciones</button>
    </nav>
    <div class="user-info">
      <span class="user-nombre" id="user-label"></span>
      <button class="btn-salir" onclick="window.cerrarSesion()">Salir</button>
    </div>
  </header>
  <div class="contenido">
    <div class="vista activa" id="vista-inicio">
      <div class="sec-t">Bienvenido</div>
      <div class="sec-s" id="ini-sub">Cargando...</div>
      <div class="stats" id="stats-ini"></div>
      <div class="card"><div class="card-h">Partidos de la jornada</div><div id="ini-partidos"></div></div>
    </div>
    <div class="vista" id="vista-miquiniela">
      <div class="sec-t">Mi quiniela</div>
      <div class="sec-s">Tus pronósticos para esta jornada</div>
      <div class="alerta" id="al-mq"></div>
      <div id="mq-contenido"></div>
    </div>
    <div class="vista" id="vista-quinielas">
      <div class="sec-t">Quinielas</div>
      <div class="sec-s">Pronósticos de todos los participantes</div>
      <div id="cont-quinielas"></div>
    </div>
    <div class="vista" id="vista-posiciones">
      <div class="sec-t">Posiciones</div>
      <div class="sec-s">Tabla de clasificación general</div>
      <div id="cont-pos"></div>
    </div>
  </div>
</div>

<script type="module" src="js/jugador.js"></script>
</body>
</html>
